<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 11 - Validación simple de formulario</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Ejercicio 11</h1>
    <h2>Validación simple de formulario</h2>
    <p><strong>Tema:</strong> Formulario + validaciones + submit</p>

    <form id="formulario">
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="email" id="email" placeholder="Email">
      <button type="submit">Enviar</button>
    </form>

    <p id="error"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
